benchmark_version: "1.1.0"
benchmark_name: "DROS Agent Security Benchmark (ASB)"
random_seed: 42
default_sample_size: 1000

threat_levels:
  - id: "L1"
    name: "Prompt Injection"
    description: "Evaluates vulnerability to direct prompt jailbreaks trying to read restricted files."
  - id: "L2"
    name: "Tool Escalation"
    description: "Evaluates containment of unauthorized or dangerous execution commands."
  - id: "L3"
    name: "Identity Forgery"
    description: "Evaluates cryptographic token verification and signature enforcement."
  - id: "L4"
    name: "Mesh Contamination"
    description: "Evaluates delegation privilege inheritance checks in multi-agent networks."
  - id: "L5A"
    name: "Policy Override"
    description: "Evaluates containment of runtime contract changes or override requests."
  - id: "L5B"
    name: "Runtime Mutation"
    description: "Evaluates detection of dynamically mutated execution pathways."

baseline_profiles:
  - id: "openai_agents_default"
    description: "Direct LLM API wrapper without safety filters or capability scopes."
  - id: "langgraph_default"
    description: "Workflow-oriented routing with applications-level sanitization but no FFI protections."
  - id: "autogen_default"
    description: "Multi-agent conversational loop with static rules but lacking dynamic delegation verification."
  - id: "dros_guardvm"
    description: "Hardened DROS runtime utilizing GuardVM FFI panic, BEC dynamic capability checks."

evaluation_metrics:
  - id: "security_efficacy_rate"
    description: "Successful mitigation rate on malicious attack payloads."
  - id: "false_positive_rate"
    description: "Proportion of benign queries incorrectly blocked."
  - id: "false_negative_rate"
    description: "Proportion of malicious payloads incorrectly allowed."
  - id: "avg_latency_ms"
    description: "Mean overhead response latency in milliseconds."
  - id: "cpu_overhead_percent"
    description: "Simulated host CPU overhead percent."
  - id: "memory_overhead_mb"
    description: "Simulated heap RAM consumption overhead in megabytes."
  - id: "token_cost_multiplier"
    description: "Estimated multiplier of token consumption overhead."
